services:
  subvoid:
    image: subvoid:local
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /app/data/subvoid.sqlite
    volumes:
      - ./data:/app/data
    restart: unless-stopped
